<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 C · 暗色索引式 | Agent Economy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0a09;
    --bg-soft: #141110;
    --text: #ece7df;
    --text-soft: #a39c91;
    --text-mute: #6b645b;
    --hair: #29241f;
    --hair-2: #3a342d;
    --gold: #d4a843;
    --warm: #c2703a;
    --serif: 'Noto Serif SC', Georgia, serif;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
    --wrap: 1080px;
    --grad: linear-gradient(120deg, #d4a843, #c2703a);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 70% 45% at 50% -15%, rgba(212,168,67,0.10), transparent),
      radial-gradient(ellipse 50% 40% at 85% 70%, rgba(194,112,58,0.06), transparent);
  }
  a { color: inherit; text-decoration: none; }
  .wrap { max-width: var(--wrap); margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

  header.top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 22px 0; border-bottom: 1px solid var(--hair);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .m {
    width: 30px; height: 30px; border-radius: 7px; background: var(--grad);
    display: grid; place-items: center; font-weight: 700; font-size: 12px; color: #1a1410;
  }
  .brand b { font-weight: 600; font-size: 18px; letter-spacing: -0.02em; }
  nav.t { display: flex; gap: 26px; }
  nav.t a {
    font-size: 12px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text-mute);
  }
  nav.t a:hover, nav.t a.on { color: var(--gold); }

  /* hero statement */
  .hero { padding: 70px 0 26px; max-width: 880px; }
  .hero .eye {
    font-family: var(--mono); font-size: 12px; letter-spacing: .2em;
    text-transform: uppercase; color: var(--warm); margin-bottom: 22px;
  }
  .hero h2 {
    font-family: var(--serif); font-weight: 500; font-size: clamp(34px, 5.2vw, 60px);
    line-height: 1.22; letter-spacing: -0.01em;
  }
  .hero h2 em {
    font-style: italic; font-weight: 600;
    background: var(--grad); -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p {
    margin-top: 24px; font-size: 16px; line-height: 1.8; color: var(--text-soft); max-width: 56ch;
  }

  /* observation strip */
  .obs {
    margin: 12px 0 8px; padding: 28px 0; border-top: 1px solid var(--hair);
    border-bottom: 1px solid var(--hair);
    display: grid; grid-template-columns: 180px 1fr; gap: 40px; align-items: start;
  }
  .obs .lab {
    font-family: var(--mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--gold);
  }
  .obs .lab .d { color: var(--text-mute); margin-top: 6px; font-size: 11px; letter-spacing: .04em; }
  .obs h3 { font-family: var(--serif); font-weight: 600; font-size: 25px; line-height: 1.3; margin-bottom: 12px; }
  .obs p { font-size: 14.5px; line-height: 1.8; color: var(--text-soft); }
  .obs .more { display: inline-block; margin-top: 14px; font-family: var(--mono); font-size: 12px; color: var(--warm); }
  .obs .more:hover { color: var(--gold); }

  /* filter row */
  .filters {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin: 46px 0 8px;
  }
  .filters .h {
    font-family: var(--mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--text-mute); margin-right: 14px;
  }
  .pill {
    font-size: 12.5px; padding: 6px 14px; border-radius: 99px; color: var(--text-soft);
    border: 1px solid var(--hair-2); cursor: pointer; transition: .2s;
  }
  .pill:hover { color: var(--gold); border-color: var(--gold); }
  .pill.on { background: var(--grad); color: #1a1410; border-color: transparent; font-weight: 600; }

  /* the index list — articles spread as a typographic table */
  .index { border-top: 1px solid var(--hair-2); }
  .row {
    display: grid; grid-template-columns: 58px 1fr 200px;
    gap: 28px; align-items: baseline;
    padding: 26px 8px; border-bottom: 1px solid var(--hair);
    position: relative; transition: padding .3s, background .3s;
  }
  .row::after {
    content: ''; position: absolute; left: 0; bottom: -1px; height: 1px; width: 0;
    background: var(--grad); transition: width .4s ease;
  }
  .row:hover { padding-left: 22px; background: rgba(212,168,67,0.025); }
  .row:hover::after { width: 100%; }
  .row .num { font-family: var(--mono); font-size: 13px; color: var(--text-mute); }
  .row:hover .num { color: var(--gold); }
  .row .main .cat {
    font-family: var(--mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--warm); margin-bottom: 8px; display: inline-block;
  }
  .row .main h4 {
    font-family: var(--serif); font-weight: 500; font-size: clamp(21px, 2.6vw, 28px);
    line-height: 1.28; letter-spacing: -0.005em;
  }
  .row:hover .main h4 { color: var(--gold); }
  .row .main p {
    font-size: 13.5px; line-height: 1.7; color: var(--text-soft); margin-top: 9px;
    max-width: 60ch;
    max-height: 0; opacity: 0; overflow: hidden;
    transition: max-height .4s ease, opacity .3s ease, margin .3s ease;
  }
  .row:hover .main p { max-height: 80px; opacity: 1; }
  .row .aside {
    text-align: right; font-family: var(--mono); font-size: 11.5px;
    color: var(--text-mute); line-height: 1.9; letter-spacing: .03em;
  }
  .row .aside .src { color: var(--text-soft); }
  .row .aside .arrow { color: var(--gold); opacity: 0; transition: opacity .3s; }
  .row:hover .aside .arrow { opacity: 1; }

  .foot { padding: 60px 0 50px; text-align: center; }
  .foot a {
    font-family: var(--mono); font-size: 12px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-soft); border: 1px solid var(--hair-2); border-radius: 99px; padding: 12px 26px;
    transition: .2s; display: inline-block;
  }
  .foot a:hover { border-color: var(--gold); color: var(--gold); }
  footer.end { border-top: 1px solid var(--hair); padding: 24px 0; color: var(--text-mute);
               font-family: var(--mono); font-size: 11px; text-align: center; letter-spacing: .05em; }

  @media (max-width: 740px) {
    nav.t { display: none; }
    .obs { grid-template-columns: 1fr; gap: 16px; }
    .row { grid-template-columns: 36px 1fr; gap: 16px; }
    .row .aside { display: none; }
    .row .main p { max-height: none; opacity: 1; margin-top: 9px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand"><div class="m">AE</div><b>Agent Economy</b></div>
      <nav class="t" id="nav"></nav>
    </header>

    <section class="hero">
      <div class="eye">2026 · 智能体经济日报</div>
      <h2>追踪 <em>智能体经济</em> 的每一次结构性位移——<br>从算力、模型，到正在被重写的工作方式。</h2>
      <p>每日精选与深度解读。不卖 token，只卖判断。</p>
    </section>

    <section class="obs" id="obs"></section>

    <div class="filters" id="filters"></div>

    <section class="index" id="index"></section>

    <div class="foot"><a href="#">查看全部 142 篇 →</a></div>
  </div>
  <footer class="end"><div class="wrap">AGENT ECONOMY · 设计稿 · agenteconomy.cn</div></footer>

<script src="./data.js"></script>
<script>
  document.getElementById('nav').innerHTML = ['文章','话题','观察','关于']
    .map((c,i)=>`<a href="#" class="${i===0?'on':''}">${c}</a>`).join('');

  const o = AE_OBSERVATION;
  document.getElementById('obs').innerHTML = `
    <div class="lab">${o.eyebrow}<div class="d">${o.date}</div></div>
    <div>
      <h3>${o.title}</h3>
      <p>${o.body}</p>
      <a class="more" href="#">阅读完整观察 →</a>
    </div>`;

  document.getElementById('filters').innerHTML =
    `<span class="h">筛选</span>` +
    AE_CATEGORIES.map((c,i)=>`<span class="pill ${i===0?'on':''}" data-c="${c}">${c}</span>`).join('');

  const index = document.getElementById('index');
  function render(cat){
    const list = AE_POSTS.filter(p => cat==='全部' || p.cat===cat);
    index.innerHTML = list.map((p,i)=>`
      <a class="row" href="#">
        <span class="num">${String(i+1).padStart(2,'0')}</span>
        <div class="main">
          <span class="cat">${p.cat}</span>
          <h4>${p.title}</h4>
          <p>${p.excerpt}</p>
        </div>
        <div class="aside">
          <div class="src">${p.source}</div>
          <div>${p.date}</div>
          <div class="arrow">阅读 →</div>
        </div>
      </a>`).join('');
  }
  render('全部');

  document.querySelectorAll('.pill').forEach(pill=>{
    pill.addEventListener('click', ()=>{
      document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
      pill.classList.add('on');
      render(pill.dataset.c);
    });
  });
</script>
</body>
</html>
