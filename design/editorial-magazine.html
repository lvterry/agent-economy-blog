<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 A · 杂志铺开式 | Agent Economy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4ede1;
    --ink: #1c1714;
    --ink-soft: #57514a;
    --ink-mute: #8a8178;
    --rule: #d8cdba;
    --rule-strong: #2a2420;
    --accent: #a85a2a;
    --gold: #9c7414;
    --serif: 'Noto Serif SC', Georgia, 'Songti SC', serif;
    --sans: 'Space Grotesk', -apple-system, 'PingFang SC', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --wrap: 1180px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    background-image:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(156,116,20,0.06), transparent),
      radial-gradient(circle at 1px 1px, rgba(0,0,0,0.018) 1px, transparent 0);
    background-size: auto, 4px 4px;
  }
  a { color: inherit; text-decoration: none; }
  .wrap { max-width: var(--wrap); margin: 0 auto; padding: 0 28px; }

  /* Masthead */
  .masthead { border-bottom: 3px double var(--rule-strong); }
  .masthead-top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; font-size: 12px; color: var(--ink-mute);
    font-family: var(--mono); letter-spacing: .04em;
    border-bottom: 1px solid var(--rule);
  }
  .masthead-top .dateline { text-transform: uppercase; }
  .masthead-mid { text-align: center; padding: 26px 0 18px; }
  .logo {
    font-family: var(--serif); font-weight: 900;
    font-size: clamp(38px, 7vw, 76px); letter-spacing: -0.02em;
    line-height: 1; color: var(--ink);
  }
  .tagline {
    margin-top: 12px; font-size: 13px; letter-spacing: .32em;
    text-transform: uppercase; color: var(--ink-soft);
  }
  nav.sections {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 0;
    border-top: 1px solid var(--rule); margin-top: 18px;
  }
  nav.sections a {
    font-size: 13px; font-weight: 600; letter-spacing: .04em;
    padding: 11px 18px; color: var(--ink-soft);
    border-right: 1px solid var(--rule);
    transition: background .2s, color .2s;
  }
  nav.sections a:first-child { border-left: 1px solid var(--rule); }
  nav.sections a:hover { background: var(--ink); color: var(--paper); }
  nav.sections a.on { color: var(--accent); }

  /* Lead */
  .lead { display: grid; grid-template-columns: 1.6fr 1fr; gap: 0;
          border-bottom: 2px solid var(--rule-strong); margin-top: 4px; }
  .lead-main { padding: 40px 40px 40px 0; border-right: 1px solid var(--rule); }
  .kicker {
    font-family: var(--mono); font-size: 12px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .kicker::before { content: ''; width: 26px; height: 2px; background: var(--accent); }
  .lead-main h2 {
    font-family: var(--serif); font-weight: 700;
    font-size: clamp(34px, 4.4vw, 52px); line-height: 1.08;
    letter-spacing: -0.01em; margin-bottom: 20px;
  }
  .lead-main h2 a:hover { color: var(--accent); }
  .lead-dek {
    font-family: var(--serif); font-size: 19px; line-height: 1.75;
    color: var(--ink-soft); max-width: 38em;
  }
  .lead-dek::first-letter {
    float: left; font-weight: 700; font-size: 64px; line-height: .82;
    padding: 6px 12px 2px 0; color: var(--accent);
  }
  .byline {
    margin-top: 24px; font-family: var(--mono); font-size: 12.5px;
    color: var(--ink-mute); letter-spacing: .03em;
  }
  .byline b { color: var(--ink); font-weight: 500; }

  /* Observation rail */
  .rail { padding: 36px 0 36px 36px; background:
          linear-gradient(180deg, rgba(156,116,20,0.05), transparent 60%); }
  .rail .badge {
    font-family: var(--mono); font-size: 11px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--gold);
    border: 1px solid var(--gold); border-radius: 2px;
    padding: 3px 9px; display: inline-block; margin-bottom: 16px;
  }
  .rail h3 {
    font-family: var(--serif); font-weight: 700; font-size: 25px;
    line-height: 1.25; margin-bottom: 14px;
  }
  .rail p { font-size: 14px; line-height: 1.78; color: var(--ink-soft); margin-bottom: 12px; }
  .rail .more { font-family: var(--mono); font-size: 12px; color: var(--accent);
                border-bottom: 1px solid var(--accent); padding-bottom: 2px; }

  /* Section header */
  .sec-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 38px 0 22px; padding-bottom: 10px;
    border-bottom: 2px solid var(--rule-strong);
  }
  .sec-head h4 {
    font-family: var(--serif); font-weight: 700; font-size: 22px;
    letter-spacing: .02em;
  }
  .sec-head .count { font-family: var(--mono); font-size: 12px; color: var(--ink-mute); }

  /* Grid spread */
  .spread {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0; border-top: 1px solid var(--rule);
  }
  .card {
    padding: 26px 26px 28px; border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule); position: relative;
    transition: background .25s;
  }
  .spread .card:nth-child(3n) { border-right: none; }
  .card:hover { background: rgba(168,90,42,0.045); }
  .card .meta {
    display: flex; align-items: center; gap: 10px; margin-bottom: 13px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .03em;
  }
  .card .cat { color: var(--accent); font-weight: 500; text-transform: uppercase; letter-spacing: .08em; }
  .card .dot { color: var(--rule); }
  .card .date { color: var(--ink-mute); }
  .card h5 {
    font-family: var(--serif); font-weight: 600; font-size: 20px;
    line-height: 1.32; letter-spacing: -0.005em; margin-bottom: 11px;
  }
  .card:hover h5 { color: var(--accent); }
  .card p {
    font-size: 13.5px; line-height: 1.7; color: var(--ink-soft);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card .src {
    margin-top: 16px; font-family: var(--mono); font-size: 11px;
    color: var(--ink-mute); display: flex; justify-content: space-between;
  }
  .card .src .read { color: var(--accent); }

  /* big feature row inside spread */
  .card.wide { grid-column: span 2; }
  .card.wide h5 { font-size: 27px; }
  .card.wide p { -webkit-line-clamp: 2; font-size: 14.5px; }

  footer {
    border-top: 3px double var(--rule-strong); margin-top: 50px;
    padding: 30px 0; text-align: center; color: var(--ink-mute);
    font-family: var(--mono); font-size: 12px; letter-spacing: .04em;
  }

  @media (max-width: 880px) {
    .lead { grid-template-columns: 1fr; }
    .lead-main { padding: 30px 0; border-right: none; border-bottom: 1px solid var(--rule); }
    .rail { padding: 30px 0; }
    .spread { grid-template-columns: 1fr 1fr; }
    .spread .card:nth-child(3n) { border-right: 1px solid var(--rule); }
    .spread .card:nth-child(2n) { border-right: none; }
    .card.wide { grid-column: span 2; }
  }
  @media (max-width: 560px) {
    .spread { grid-template-columns: 1fr; }
    .card, .spread .card:nth-child(3n) { border-right: none; }
    .card.wide { grid-column: span 1; }
    nav.sections a { padding: 9px 11px; font-size: 12px; }
  }
</style>
</head>
<body>
  <header class="masthead">
    <div class="wrap">
      <div class="masthead-top">
        <span class="dateline" id="dateline"></span>
        <span>智能体经济 · 每日策展</span>
        <span>第 142 期</span>
      </div>
      <div class="masthead-mid">
        <div class="logo">Agent Economy</div>
        <div class="tagline">A I &nbsp; A G E N T &nbsp; E C O N O M Y &nbsp; D A I L Y</div>
      </div>
      <nav class="sections" id="nav"></nav>
    </div>
  </header>

  <div class="wrap">
    <section class="lead">
      <div class="lead-main" id="lead-main"></div>
      <aside class="rail" id="rail"></aside>
    </section>

    <div class="sec-head">
      <h4>近期报道</h4>
      <span class="count" id="count"></span>
    </div>
    <section class="spread" id="spread"></section>
  </div>

  <footer>
    <div class="wrap">AGENT ECONOMY · 仅为设计稿 · 真实内容来自 agenteconomy.cn</div>
  </footer>

<script src="./data.js"></script>
<script>
  document.getElementById('dateline').textContent =
    new Date('2026-05-29').toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

  document.getElementById('nav').innerHTML = AE_CATEGORIES
    .map((c,i) => `<a href="#" class="${i===0?'on':''}">${c}</a>`).join('');

  const posts = AE_POSTS;
  const lead = posts[0];
  document.getElementById('lead-main').innerHTML = `
    <span class="kicker">${lead.cat} · 头条</span>
    <h2><a href="#">${lead.title}</a></h2>
    <p class="lead-dek">${lead.excerpt}</p>
    <div class="byline">来源 <b>${lead.source}</b> · ${lead.date} · 阅读全文 →</div>`;

  const o = AE_OBSERVATION;
  document.getElementById('rail').innerHTML = `
    <span class="badge">${o.eyebrow}</span>
    <h3>${o.title}</h3>
    <p>${o.body}</p>
    <p>${o.tail}</p>
    <a class="more" href="#">查看全部观察 →</a>`;

  const rest = posts.slice(1);
  document.getElementById('count').textContent = `共 ${posts.length} 篇`;
  document.getElementById('spread').innerHTML = rest.map((p, i) => `
    <article class="card ${i===0?'wide':''}">
      <div class="meta">
        <span class="cat">${p.cat}</span><span class="dot">◆</span>
        <span class="date">${p.date}</span>
      </div>
      <h5><a href="#">${p.title}</a></h5>
      <p>${p.excerpt}</p>
      <div class="src"><span>${p.source}</span><span class="read">阅读 →</span></div>
    </article>`).join('');
</script>
</body>
</html>
