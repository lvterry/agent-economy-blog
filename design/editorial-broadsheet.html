<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 B · 报刊多栏式 | Agent Economy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf7f0;
    --ink: #16130f;
    --ink-soft: #423d36;
    --ink-mute: #7d756a;
    --rule: #c9bda9;
    --hair: #ddd3c1;
    --accent: #9a3b1c;
    --serif: 'Noto Serif SC', Georgia, serif;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
    --wrap: 1240px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: var(--serif); -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  .wrap { max-width: var(--wrap); margin: 0 auto; padding: 0 26px; }

  /* nameplate */
  .nameplate { border-bottom: 4px solid var(--ink); }
  .np-bar {
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 11px; letter-spacing: .08em;
    color: var(--ink-mute); padding: 8px 0; text-transform: uppercase;
  }
  .np-title {
    text-align: center; padding: 14px 0 16px;
    border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink);
  }
  .np-title h1 {
    font-weight: 900; font-size: clamp(40px, 8vw, 88px);
    letter-spacing: -0.03em; line-height: .92;
  }
  .np-sub {
    display: flex; justify-content: center; gap: 22px; margin-top: 10px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .22em;
    text-transform: uppercase; color: var(--ink-soft);
  }
  nav.kios { display: flex; flex-wrap: wrap; justify-content: center; padding: 9px 0; gap: 4px; }
  nav.kios a {
    font-family: var(--sans); font-size: 12.5px; font-weight: 600;
    padding: 4px 14px; color: var(--ink-soft); letter-spacing: .02em;
  }
  nav.kios a:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  nav.kios a.on { color: var(--accent); }

  /* main columns */
  .columns {
    display: grid; grid-template-columns: 2.3fr 1fr; gap: 0;
    border-top: 2px solid var(--ink);
  }
  .col-left { padding: 26px 34px 26px 0; border-right: 1px solid var(--ink); }
  .col-right { padding: 26px 0 26px 30px; }

  .top-kicker {
    font-family: var(--mono); font-size: 11px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--accent);
    border-bottom: 1px solid var(--accent); display: inline-block;
    padding-bottom: 3px; margin-bottom: 14px;
  }
  .headline {
    font-weight: 900; font-size: clamp(32px, 4.6vw, 50px);
    line-height: 1.05; letter-spacing: -0.015em; margin-bottom: 18px;
  }
  .headline a:hover { color: var(--accent); }
  .subhead {
    font-size: 18px; line-height: 1.7; color: var(--ink-soft);
    font-weight: 500; padding-bottom: 18px; margin-bottom: 4px;
    border-bottom: 1px solid var(--hair);
    text-align: center; font-style: italic;
  }
  /* the lead body flows into 2 text columns */
  .lead-body {
    column-count: 2; column-gap: 30px; column-rule: 1px solid var(--hair);
    font-size: 15px; line-height: 1.8; color: var(--ink-soft); margin-top: 18px;
  }
  .lead-body p { margin-bottom: 13px; }
  .lead-body p:first-child::first-letter {
    float: left; font-weight: 900; font-size: 58px; line-height: .8;
    padding: 4px 10px 0 0; color: var(--ink);
  }
  .lead-meta {
    font-family: var(--mono); font-size: 11px; color: var(--ink-mute);
    margin-top: 18px; letter-spacing: .04em; text-transform: uppercase;
  }

  /* right rail = observation + brief list */
  .rail-box {
    border: 2px solid var(--ink); padding: 18px 18px 20px; margin-bottom: 26px;
    background: linear-gradient(180deg, rgba(154,59,28,0.05), transparent);
  }
  .rail-box .tag {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em;
    text-transform: uppercase; background: var(--ink); color: var(--paper);
    padding: 3px 8px; display: inline-block; margin-bottom: 12px;
  }
  .rail-box h3 { font-weight: 700; font-size: 21px; line-height: 1.25; margin-bottom: 10px; }
  .rail-box p { font-size: 13px; line-height: 1.72; color: var(--ink-soft); margin-bottom: 9px; }
  .rail-box .more { font-family: var(--mono); font-size: 11px; color: var(--accent); }

  .rail-h {
    font-family: var(--sans); font-weight: 600; font-size: 13px;
    letter-spacing: .08em; text-transform: uppercase; color: var(--ink);
    border-bottom: 2px solid var(--ink); padding-bottom: 7px; margin-bottom: 4px;
  }
  .brief { border-bottom: 1px solid var(--hair); padding: 13px 0; display: flex; gap: 12px; }
  .brief .no {
    font-family: var(--mono); font-size: 13px; font-weight: 500;
    color: var(--accent); flex: none; padding-top: 2px;
  }
  .brief h6 { font-weight: 600; font-size: 15.5px; line-height: 1.34; margin-bottom: 4px; }
  .brief:hover h6 { color: var(--accent); }
  .brief .m { font-family: var(--mono); font-size: 10.5px; color: var(--ink-mute); letter-spacing: .03em; }

  /* lower deck: dense multi-column story grid */
  .deck-head {
    margin: 34px 0 0; padding: 9px 0; text-align: center;
    border-top: 2px solid var(--ink); border-bottom: 1px solid var(--ink);
    font-family: var(--sans); font-weight: 600; font-size: 13px;
    letter-spacing: .28em; text-transform: uppercase;
  }
  .deck {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-bottom: 2px solid var(--ink);
  }
  .story {
    padding: 20px 18px 22px; border-right: 1px solid var(--hair);
    border-bottom: 1px solid var(--hair); transition: background .2s;
  }
  .deck .story:nth-child(4n) { border-right: none; }
  .story:hover { background: rgba(154,59,28,0.04); }
  .story .k {
    font-family: var(--mono); font-size: 10px; letter-spacing: .1em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 9px;
  }
  .story h5 { font-weight: 700; font-size: 17px; line-height: 1.3; margin-bottom: 9px; }
  .story:hover h5 { color: var(--accent); }
  .story p {
    font-size: 12.5px; line-height: 1.65; color: var(--ink-soft);
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
  }
  .story .src { margin-top: 12px; font-family: var(--mono); font-size: 10px;
                color: var(--ink-mute); letter-spacing: .04em; }

  footer { padding: 26px 0; text-align: center; color: var(--ink-mute);
           font-family: var(--mono); font-size: 11px; letter-spacing: .06em; }

  @media (max-width: 900px) {
    .columns { grid-template-columns: 1fr; }
    .col-left { border-right: none; border-bottom: 2px solid var(--ink); padding: 24px 0; }
    .col-right { padding: 24px 0; }
    .deck { grid-template-columns: repeat(2, 1fr); }
    .deck .story:nth-child(4n) { border-right: 1px solid var(--hair); }
    .deck .story:nth-child(2n) { border-right: none; }
  }
  @media (max-width: 560px) {
    .lead-body { column-count: 1; }
    .deck { grid-template-columns: 1fr; }
    .story, .deck .story:nth-child(4n) { border-right: none; }
  }
</style>
</head>
<body>
  <header class="nameplate">
    <div class="wrap">
      <div class="np-bar">
        <span id="dateline"></span>
        <span>独立策展 · 无广告</span>
        <span>定价 ¥0.00</span>
      </div>
      <div class="np-title">
        <h1>The Agent Economy</h1>
        <div class="np-sub"><span>智能体经济日报</span><span>Vol. XII</span><span>agenteconomy.cn</span></div>
      </div>
      <nav class="kios" id="nav"></nav>
    </div>
  </header>

  <div class="wrap">
    <section class="columns">
      <div class="col-left" id="lead"></div>
      <aside class="col-right">
        <div class="rail-box" id="obs"></div>
        <div class="rail-h">简讯 · BRIEFS</div>
        <div id="briefs"></div>
      </aside>
    </section>

    <div class="deck-head">更多报道 · MORE STORIES</div>
    <section class="deck" id="deck"></section>
  </div>

  <footer class="wrap">AGENT ECONOMY · 设计稿 · © 2026</footer>

<script src="./data.js"></script>
<script>
  document.getElementById('dateline').textContent =
    new Date('2026-05-29').toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' }).toUpperCase();

  document.getElementById('nav').innerHTML = AE_CATEGORIES
    .map((c,i) => `<a href="#" class="${i===0?'on':''}">${c}</a>`).join('');

  const posts = AE_POSTS, lead = posts[0];
  document.getElementById('lead').innerHTML = `
    <span class="top-kicker">${lead.cat} · 今日头条</span>
    <h2 class="headline"><a href="#">${lead.title}</a></h2>
    <p class="subhead">${lead.excerpt}</p>
    <div class="lead-body">
      <p>${lead.excerpt} 这篇分析覆盖了从硬件采购、电力与机房成本，到模型训练吞吐与折旧周期的完整账目，并把自建方案与按需租用的云 GPU 做了逐月对比。</p>
      <p>作者强调，决定盈亏平衡点的并不只是显卡单价，而是利用率：当 GPU 长期闲置时，自建的折旧很快吞掉表面上的单价优势；而当负载饱和、且任务对延迟与数据合规敏感时，自建则迅速反超。</p>
      <p>结论指向一个正在重塑行业的事实——在智能体时代，算力既是成本中心，也是战略护城河。</p>
    </div>
    <div class="lead-meta">来源 ${lead.source} · ${lead.date} · 全文 →</div>`;

  const o = AE_OBSERVATION;
  document.getElementById('obs').innerHTML = `
    <span class="tag">${o.eyebrow}</span>
    <h3>${o.title}</h3>
    <p>${o.body}</p>
    <a class="more" href="#">读完整观察 →</a>`;

  document.getElementById('briefs').innerHTML = posts.slice(1,5).map((p,i)=>`
    <div class="brief">
      <span class="no">${String(i+1).padStart(2,'0')}</span>
      <div><h6><a href="#">${p.title}</a></h6>
      <span class="m">${p.cat} · ${p.source}</span></div>
    </div>`).join('');

  document.getElementById('deck').innerHTML = posts.slice(5).map(p=>`
    <article class="story">
      <div class="k">${p.cat}</div>
      <h5><a href="#">${p.title}</a></h5>
      <p>${p.excerpt}</p>
      <div class="src">${p.source} · ${p.date}</div>
    </article>`).join('');
</script>
</body>
</html>
