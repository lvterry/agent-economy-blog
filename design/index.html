<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial 首页设计稿 | Agent Economy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0c0a09; --surf:#16130f; --text:#ece7df; --soft:#a39c91; --mute:#6b645b;
    --hair:#2a241f; --gold:#d4a843; --warm:#c2703a;
    --serif:'Noto Serif SC',Georgia,serif; --mono:'JetBrains Mono',monospace; --sans:'Space Grotesk',sans-serif;
    --grad:linear-gradient(120deg,#d4a843,#c2703a);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased;
         background-image:radial-gradient(ellipse 70% 45% at 50% -10%, rgba(212,168,67,0.10), transparent); min-height:100vh; }
  a { color:inherit; text-decoration:none; }
  .wrap { max-width:1000px; margin:0 auto; padding:0 32px; }
  header { padding:64px 0 8px; }
  .eye { font-family:var(--mono); font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--warm); margin-bottom:18px; }
  h1 { font-family:var(--serif); font-weight:700; font-size:clamp(32px,5vw,52px); line-height:1.15; letter-spacing:-0.01em; }
  h1 em { font-style:italic; background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .lede { margin-top:20px; font-size:16px; line-height:1.8; color:var(--soft); max-width:62ch; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; padding:48px 0 30px; }
  .card { border:1px solid var(--hair); border-radius:14px; background:var(--surf); overflow:hidden;
          transition:.3s; display:flex; flex-direction:column; }
  .card:hover { border-color:rgba(212,168,67,.4); transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,.4); }
  .thumb { height:158px; position:relative; overflow:hidden; border-bottom:1px solid var(--hair); }
  .thumb svg { position:absolute; inset:0; width:100%; height:100%; }
  .card .body { padding:20px 22px 24px; flex:1; display:flex; flex-direction:column; }
  .tagn { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--warm); margin-bottom:10px; }
  .card h3 { font-family:var(--serif); font-weight:600; font-size:22px; line-height:1.3; margin-bottom:10px; }
  .card p { font-size:13.5px; line-height:1.7; color:var(--soft); flex:1; }
  .card .go { margin-top:18px; font-family:var(--mono); font-size:12px; color:var(--gold); display:flex; align-items:center; gap:8px; }
  .card:hover .go { gap:14px; }
  .note { margin:10px 0 70px; padding:22px 26px; border:1px dashed var(--hair); border-radius:12px;
          font-size:13.5px; line-height:1.85; color:var(--soft); }
  .note b { color:var(--text); font-weight:600; }
  .note code { font-family:var(--mono); font-size:12px; color:var(--gold); background:rgba(212,168,67,.08); padding:2px 7px; border-radius:5px; }
  @media (max-width:760px){ .grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eye">Homepage Design · 探索稿</div>
    <h1>三种 <em>Editorial</em> 首页方向</h1>
    <p class="lede">基于真实文章数据做的三套首页设计稿，核心都是把文章「铺开」而非单列堆叠。点开任意一张卡片预览完整效果，挑一个方向，我再把它落到 Astro 站点上。</p>
  </header>

  <section class="grid" id="grid"></section>

  <div class="note">
    <b>说明：</b> 三套稿都用了真实文章 + 最新「观察」内容，但链接是占位的。配色延续站点的暖金调，并引入衬线字体（思源宋体）营造 editorial 质感。本地预览：进入 <code>design/</code> 目录后运行 <code>python3 -m http.server</code>，再访问 <code>localhost:8000</code>。
  </div>
</div>

<script>
  const grad = (a,b)=>`<svg viewBox="0 0 400 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="g${a}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${a}"/><stop offset="1" stop-color="${b}"/></linearGradient></defs>
    <rect width="400" height="200" fill="url(#g${a})" opacity="0.9"/>
    <g stroke="rgba(255,255,255,.18)" stroke-width="1" fill="none">
      ${Array.from({length:9},(_,i)=>`<line x1="${i*50}" y1="0" x2="${i*50}" y2="200"/>`).join('')}
    </g></svg>`;

  const cards = [
    { f:'editorial-magazine.html', t:'方案 A · 杂志铺开式', tag:'Magazine',
      d:'奶油纸质感、衬线大标题。头条占据视觉重心，下方多栏网格把文章铺开，右侧固定「本周观察」专栏。最像一本印刷杂志的封面与目录跨页。',
      a:'#c2703a', b:'#8a3d1a' },
    { f:'editorial-broadsheet.html', t:'方案 B · 报刊多栏式', tag:'Broadsheet',
      d:'经典报纸排版：报头、双线分隔、头条正文分两栏流动，右栏放观察与编号简讯，底部四栏密集铺开更多报道。信息密度最高。',
      a:'#5b6dba', b:'#1f3a6e' },
    { f:'editorial-index.html', t:'方案 C · 暗色索引式', tag:'Dark Index',
      d:'延续站点深色金调。超大衬线标语开场，文章以排版化的「目录索引」逐行铺开，hover 时展开摘要。最克制、最当代，留白驱动。',
      a:'#d4a843', b:'#7c5fb8' },
  ];

  document.getElementById('grid').innerHTML = cards.map(c=>`
    <a class="card" href="./${c.f}">
      <div class="thumb">${grad(c.a,c.b)}</div>
      <div class="body">
        <div class="tagn">${c.tag}</div>
        <h3>${c.t}</h3>
        <p>${c.d}</p>
        <div class="go">查看预览 →</div>
      </div>
    </a>`).join('');
</script>
</body>
</html>
